          max(slo:sli_error:ratio_rate6h{sloth_id="online-cinema-ml-service-service-availability", sloth_service="online-cinema-ml-service", sloth_slo="service-availability"} > (1 * 0.01)) without (sloth_window)
          and
          max(slo:sli_error:ratio_rate3d{sloth_id="online-cinema-ml-service-service-availability", sloth_service="online-cinema-ml-service", sloth_slo="service-availability"} > (1 * 0.01)) without (sloth_window)
      )
    labels:
      category: availability
