- name: sloth-slo-alerts-online-cinema-ml-service-service-availability
  rules:
  - alert: LowAvailability
    expr: |
      (
          max(slo:sli_error:ratio_rate5m{sloth_id="online-cinema-ml-service-service-availability", sloth_service="online-cinema-ml-service", sloth_slo="service-availability"} > (14.4 * 0.01)) without (sloth_window)
          and
          max(slo:sli_error:ratio_rate1h{sloth_id="online-cinema-ml-service-service-availability", sloth_service="online-cinema-ml-service", sloth_slo="service-availability"} > (14.4 * 0.01)) without (sloth_window)
      )
      or
      (
          max(slo:sli_error:ratio_rate30m{sloth_id="online-cinema-ml-service-service-availability", sloth_service="online-cinema-ml-service", sloth_slo="service-availability"} > (6 * 0.01)) without (sloth_window)
          and
          max(slo:sli_error:ratio_rate6h{sloth_id="online-cinema-ml-service-service-availability", sloth_service="online-cinema-ml-service", sloth_slo="service-availability"} > (6 * 0.01)) without (sloth_window)
      )
    labels:
      category: availability
      severity: critical
      sloth_severity: page
    annotations:
      description: ML service availability is below 99%.
      summary: Low service availability detected
      title: (page) {{$labels.sloth_service}} {{$labels.sloth_slo}} SLO error budget
        burn rate is too fast.
  - alert: LowAvailability
